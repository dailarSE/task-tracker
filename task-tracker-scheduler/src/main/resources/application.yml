spring:
  application:
    name:
      task-tracker-scheduler
  data:
    redis:
      host: redis
      port: 6379
  kafka:
    bootstrap-servers: kafka:9092
    properties:
      request.timeout.ms: 30000
    producer:
      acks: "all"
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      retries: 3
      properties:
        spring.json.add.type.headers: false
        # Общий таймаут на доставку сообщения, включая все ретраи.
        # Должен быть больше, чем request.timeout.ms * (retries + 1)
        delivery.timeout.ms: 121000 # 2 минуты + dt
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest
      properties:
        # Максимальное время между вызовами poll().
        max.poll.interval.ms: 300000 # 5 минут
        # Таймаут сессии для consumer group.
        session.timeout.ms: 30000
        # Частота отправки "heartbeat" для поддержания сессии.
        # Обычно ~1/3 от session.timeout.ms.
        heartbeat.interval.ms: 10000 # 10 секунд
    listener:
      missing-topics-fatal: true
    admin:
      fail-fast: true

logging:
  structured:
    format:
      console: ecs
  level:
    root: INFO

management:
  endpoints:
    web:
      exposure:
        include: health, info

otel:
  service:
    name: ${spring.application.name}
  exporter:
    otlp:
      endpoint: http://otel-collector:4318 # OTLP/HTTP
  instrumentation:
    common:
      default-enabled: true
    micrometer:
      enabled: true
    logback-appender:
      enabled: true
      experimental:
        capture-mdc-attributes: "*"
  propagators: tracecontext,baggage
  traces:
    sampler:
      arg: "0.1"

app:
  scheduler:
    # --- Backend HTTP Client ---
    backend-client:
      url: "http://task-tracker-backend:8080"
      api-key: "${BACKEND_API_KEY:key-for-scheduler}"
      connect-timeout: 5s # Дефолт
      read-timeout: 30s   # Дефолт
      retry:
        enabled: true
        max-attempts: 3
        initial-interval-ms: 2000
        multiplier: 2.0
        max-interval-ms: 10000

    jobs:
      daily-task-reports:
        enabled: true
        job-name: "daily-task-reports-v1"
        cron: "0 */15 * * * *"
        page-size: 1000
        kafka-topic-name: "task_tracker.scheduler.events.user_selected_for_report"
        shedlock:
          lock-at-least-for: "30s"
          lock-at-most-for: "5m"

    consumers:
      daily-report:
        enabled: true
        topic-name: "task_tracker.scheduler.events.user_selected_for_report"
        sink-topic-name: "task_tracker.reporting.events.daily_report_generated"
        group-id: "scheduler-daily-report-group"
        concurrency: 3
        max-poll-records: 500
        poll-timeout: 3000ms
        fetch-max-wait-ms: 500
        retry-and-dlt:
          enabled: true
          max-attempts: 3
          initial-interval-ms: 2000
          multiplier: 2.0
          max-interval-ms: 10000
          dlt:
            enabled: true

    email-publishing:
      validity:
        default-duration: 24h
        policies:
          DAILY_TASK_REPORT: 8h
          USER_WELCOME: 30m
